<!DOCTYPE html>
<html>
<head>
  <title>Yuri Art Gallery</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      background: #0f0f12;
      color: #eee;
      font-family: Arial, sans-serif;
    }

    .wrap {
      max-width: 1100px;
      margin: auto;
      padding: 24px;
    }

    .top {
      margin-bottom: 20px;
      border-bottom: 1px solid #292932;
      padding-bottom: 14px;
    }

    h1 {
      margin: 0;
      font-size: 32px;
    }

    .sub {
      color: #aaa;
      margin-top: 5px;
      font-size: 14px;
    }

    .tabs {
      display: flex;
      gap: 10px;
      margin-top: 14px;
      flex-wrap: wrap;
    }

    .tab {
      padding: 9px 15px;
      border-radius: 10px;
      background: #18181d;
      border: 1px solid #292932;
      color: #ddd;
      cursor: pointer;
      font-size: 14px;
    }

    .tab.active {
      background: #ff6fae;
      border-color: #ff6fae;
      color: white;
      font-weight: bold;
    }

    .box {
      background: #18181d;
      border: 1px solid #292932;
      border-radius: 14px;
      padding: 16px;
      margin-bottom: 25px;
    }

    .upload-grid, .admin-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    input, textarea, button, select {
      width: 100%;
      border: 0;
      outline: 0;
      border-radius: 10px;
      padding: 11px;
      font-size: 14px;
    }

    input, textarea, select {
      background: #101014;
      color: white;
      border: 1px solid #2d2d36;
    }

    textarea {
      resize: vertical;
      min-height: 80px;
      grid-column: span 2;
    }

    #file, .full {
      grid-column: span 2;
    }

    button {
      background: #ff6fae;
      color: white;
      font-weight: bold;
      cursor: pointer;
      grid-column: span 2;
    }

    button:hover {
      filter: brightness(1.08);
    }

    #status, #adminStatus {
      color: #bbb;
      margin-bottom: 0;
      font-size: 14px;
    }

    .nsfw-toggle {
      grid-column: span 2;
      display: flex;
      align-items: center;
      gap: 10px;
      cursor: pointer;
      user-select: none;
      font-size: 14px;
      color: #ccc;
      background: #101014;
      border: 1px solid #2d2d36;
      border-radius: 10px;
      padding: 11px;
    }

    .nsfw-toggle input {
      display: none;
    }

    .nsfw-box {
      width: 24px;
      height: 24px;
      border-radius: 7px;
      background: #18181d;
      border: 1px solid #393944;
      position: relative;
      transition: all 0.15s;
      flex: 0 0 auto;
    }

    .nsfw-toggle input:checked + .nsfw-box {
      background: #ff6fae;
      border-color: #ff6fae;
    }

    .nsfw-box::after {
      content: "";
      position: absolute;
      width: 7px;
      height: 12px;
      border: solid white;
      border-width: 0 2px 2px 0;
      top: 3px;
      left: 8px;
      transform: rotate(45deg);
      opacity: 0;
    }

    .nsfw-toggle input:checked + .nsfw-box::after {
      opacity: 1;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(230px, 1fr));
      gap: 16px;
    }

    .card {
      background: #18181d;
      border: 1px solid #292932;
      border-radius: 14px;
      overflow: hidden;
    }

    .card img {
      width: 100%;
      height: 260px;
      object-fit: cover;
      display: block;
      background: #08080a;
    }

    .info {
      padding: 13px;
    }

    .info h3 {
      margin: 0 0 6px;
      font-size: 17px;
    }

    .meta {
      color: #aaa;
      font-size: 12px;
      margin-bottom: 8px;
    }

    .desc {
      color: #ddd;
      font-size: 14px;
      line-height: 1.35;
      white-space: pre-wrap;
    }

    .download {
      display: inline-block;
      margin-top: 10px;
      color: #ff9ccc;
      text-decoration: none;
      font-size: 14px;
    }

    .download:hover {
      text-decoration: underline;
    }

    .modal-bg {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.72);
      display: none;
      align-items: center;
      justify-content: center;
      padding: 20px;
      z-index: 9999;
    }

    .modal {
      width: 100%;
      max-width: 430px;
      background: #18181d;
      border: 1px solid #383846;
      border-radius: 18px;
      padding: 22px;
      box-shadow: 0 20px 80px rgba(0, 0, 0, 0.55);
    }

    .modal h2 {
      margin: 0 0 8px;
      font-size: 24px;
    }

    .modal p {
      margin: 0 0 18px;
      color: #bbb;
      line-height: 1.45;
      font-size: 14px;
    }

    .modal-buttons {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .modal-buttons button {
      grid-column: auto;
    }

    .cancel {
      background: #2a2a34;
    }

    #adminPage {
      display: none;
    }

    .admin-card {
      background: #18181d;
      border: 1px solid #292932;
      border-radius: 14px;
      padding: 14px;
      display: grid;
      gap: 10px;
    }

    .admin-card img {
      width: 100%;
      max-height: 280px;
      object-fit: cover;
      border-radius: 10px;
      background: #08080a;
    }

    .danger {
      background: #d9365f;
    }

    .same-group {
      grid-column: 1 / -1;
      background: #18181d;
      border: 1px solid #292932;
      border-radius: 14px;
      padding: 16px;
    }

    .same-group h2 {
      margin: 0 0 14px;
      font-size: 20px;
    }

    @media (max-width: 600px) {
      .upload-grid, .admin-grid { grid-template-columns: 1fr; }
      textarea, #file, button, .nsfw-toggle, .full { grid-column: span 1; }
      .modal-buttons { grid-template-columns: 1fr; }
    }
  </style>
</head>

<body>

<div id="mainPage">
  <div class="wrap">
    <div class="top">
      <h1>Yuri Art Gallery</h1>
      <div class="sub">post art, browse it, download it</div>

      <div class="tabs">
        <div class="tab active" id="sfwTab" onclick="switchTab('sfw')">SFW</div>
        <div class="tab" id="nsfwTab" onclick="switchTab('nsfw')">NSFW</div>
      </div>
    </div>

    <div class="box">
      <div class="upload-grid">
        <input id="username" placeholder="Username">
        <input id="title" placeholder="Title">
        <textarea id="description" placeholder="Description"></textarea>
        <input id="file" type="file" multiple accept="image/png,image/jpeg,image/webp,image/gif">

        <label class="nsfw-toggle">
          <input type="checkbox" id="nsfwCheck">
          <div class="nsfw-box"></div>
          <span>Mark as NSFW</span>
        </label>

        <button onclick="uploadArt()">Upload</button>
      </div>

      <p id="status"></p>
    </div>

    <div id="gallery" class="grid"></div>
  </div>
</div>

<div id="adminPage">
  <div class="wrap">
    <div class="top">
      <h1>Admin</h1>
      <div class="sub">edit or delete posts</div>

      <div class="tabs" id="adminTabs" style="display:none">
        <div class="tab active" id="allPostsTab" onclick="switchAdminTab('all')">All Posts</div>
        <div class="tab" id="sameImagesTab" onclick="switchAdminTab('same')">Same Images</div>
      </div>
    </div>

    <div class="box" id="loginBox">
      <div class="admin-grid">
        <input id="adminEmail" placeholder="Email">
        <input id="adminPassword" type="password" placeholder="Password">
        <button onclick="adminLogin()">Login</button>
      </div>
      <p id="adminStatus"></p>
    </div>

    <div class="box" id="adminControls" style="display:none">
      <button onclick="adminLogout()">Logout</button>
    </div>

    <div id="adminPosts" class="grid"></div>
  </div>
</div>

<div class="modal-bg" id="nsfwModal">
  <div class="modal">
    <h2>NSFW section</h2>
    <p>
      This section may contain adult content. Only continue if you are old enough
      to view it and you understand what you are opening.
    </p>

    <div class="modal-buttons">
      <button class="cancel" onclick="closeNSFWPopup()">Cancel</button>
      <button onclick="confirmNSFW()">Enter</button>
    </div>
  </div>
</div>

<script type="module">
import { createClient } from "https://esm.sh/@supabase/supabase-js@2";

const SUPABASE_URL = "https://elxdfsnccwqqqjiujywi.supabase.co";
const SUPABASE_KEY = "sb_publishable_ENl8RAMVFXPJ1OKxckfsww_NpsjLIH0";

const supabase = createClient(SUPABASE_URL, SUPABASE_KEY);

let currentTab = "sfw";
let adminTab = "all";
let nsfwUnlocked = false;

const allowed = ["image/png", "image/jpeg", "image/webp", "image/gif"];

function isAdminPage() {
  return location.hash === "#admin";
}

function renderPage() {
  document.getElementById("mainPage").style.display = isAdminPage() ? "none" : "block";
  document.getElementById("adminPage").style.display = isAdminPage() ? "block" : "none";

  if (isAdminPage()) checkAdmin();
  else loadGallery();
}

window.addEventListener("hashchange", renderPage);

window.switchTab = function(tab) {
  if (tab === "nsfw" && !nsfwUnlocked) {
    document.getElementById("nsfwModal").style.display = "flex";
    return;
  }

  currentTab = tab;

  document.getElementById("sfwTab").classList.remove("active");
  document.getElementById("nsfwTab").classList.remove("active");
  document.getElementById(tab + "Tab").classList.add("active");

  loadGallery();
};

window.switchAdminTab = function(tab) {
  adminTab = tab;

  document.getElementById("allPostsTab").classList.toggle("active", tab === "all");
  document.getElementById("sameImagesTab").classList.toggle("active", tab === "same");

  if (tab === "all") loadAdminPosts();
  if (tab === "same") loadSameImages();
};

window.closeNSFWPopup = function() {
  document.getElementById("nsfwModal").style.display = "none";
};

window.confirmNSFW = function() {
  nsfwUnlocked = true;
  document.getElementById("nsfwModal").style.display = "none";
  switchTab("nsfw");
};

async function getImageHash(file) {
  const buf = await file.arrayBuffer();
  const hash = await crypto.subtle.digest("SHA-256", buf);

  return [...new Uint8Array(hash)]
    .map(b => b.toString(16).padStart(2, "0"))
    .join("");
}

window.uploadArt = async function () {
  const username = document.getElementById("username").value.trim() || "anonymous";
  const title = document.getElementById("title").value.trim();
  const description = document.getElementById("description").value.trim();
  const files = [...document.getElementById("file").files];
  const nsfw = document.getElementById("nsfwCheck").checked;
  const status = document.getElementById("status");

  if (!title || files.length === 0) {
    status.textContent = "add a title and at least one image";
    return;
  }

  for (const file of files) {
    if (!allowed.includes(file.type)) {
      status.textContent = file.name + " invalid type";
      return;
    }

    if (file.size > 10 * 1024 * 1024) {
      status.textContent = file.name + " over 10mb";
      return;
    }
  }

  status.textContent = "uploading " + files.length + " image(s)...";

  try {
    await Promise.all(files.map(async (file, i) => {
      const safeName = file.name.replace(/[^a-z0-9._-]/gi, "_");
      const filePath = crypto.randomUUID() + "_" + safeName;
      const imageHash = await getImageHash(file);

      const upload = await supabase.storage.from("art").upload(filePath, file);

      if (upload.error) throw new Error(upload.error.message);

      const imageUrl = supabase.storage.from("art").getPublicUrl(filePath).data.publicUrl;

      const post = await supabase.from("posts").insert({
        username,
        title: files.length > 1 ? title + " " + (i + 1) : title,
        description,
        image_url: imageUrl,
        file_path: filePath,
        image_hash: imageHash,
        nsfw
      });

      if (post.error) throw new Error(post.error.message);
    }));

    status.textContent = "uploaded";
    document.getElementById("file").value = "";
    loadGallery();
  } catch (err) {
    status.textContent = err.message;
  }
};

async function loadGallery() {
  const gallery = document.getElementById("gallery");

  const result = await supabase
    .from("posts")
    .select("*")
    .order("created_at", { ascending: false });

  if (result.error) {
    gallery.textContent = result.error.message;
    return;
  }

  gallery.innerHTML = "";

  result.data
    .filter(post => currentTab === "nsfw" ? post.nsfw : !post.nsfw)
    .forEach(post => {
      const time = new Date(post.created_at).toLocaleString();

      const card = document.createElement("div");
      card.className = "card";

      card.innerHTML = `
        <img src="${cleanAttr(post.image_url)}" loading="lazy">
        <div class="info">
          <h3>${clean(post.title)}</h3>
          <div class="meta">by ${clean(post.username || "anonymous")} · ${clean(time)}</div>
          <div class="desc">${clean(post.description || "")}</div>
          <a class="download" href="${cleanAttr(post.image_url)}" download>download</a>
        </div>
      `;

      gallery.appendChild(card);
    });
}

window.adminLogin = async function () {
  const email = document.getElementById("adminEmail").value.trim();
  const password = document.getElementById("adminPassword").value;
  const status = document.getElementById("adminStatus");

  const result = await supabase.auth.signInWithPassword({ email, password });

  if (result.error) {
    status.textContent = result.error.message;
    return;
  }

  status.textContent = "logged in";
  checkAdmin();
};

window.adminLogout = async function () {
  await supabase.auth.signOut();
  checkAdmin();
};

async function checkAdmin() {
  const session = await supabase.auth.getSession();
  const loggedIn = !!session.data.session;

  document.getElementById("loginBox").style.display = loggedIn ? "none" : "block";
  document.getElementById("adminControls").style.display = loggedIn ? "block" : "none";
  document.getElementById("adminTabs").style.display = loggedIn ? "flex" : "none";

  if (loggedIn) {
    if (adminTab === "all") loadAdminPosts();
    if (adminTab === "same") loadSameImages();
  } else {
    document.getElementById("adminPosts").innerHTML = "";
  }
}

async function getAllPosts() {
  const result = await supabase
    .from("posts")
    .select("*")
    .order("created_at", { ascending: false });

  if (result.error) throw new Error(result.error.message);
  return result.data;
}

async function loadAdminPosts() {
  const adminPosts = document.getElementById("adminPosts");

  try {
    const posts = await getAllPosts();
    adminPosts.innerHTML = "";
    posts.forEach(post => adminPosts.appendChild(makeAdminCard(post)));
  } catch (err) {
    adminPosts.textContent = err.message;
  }
}

async function loadSameImages() {
  const adminPosts = document.getElementById("adminPosts");

  try {
    const posts = await getAllPosts();
    const groups = {};

    for (const post of posts) {
      if (!post.image_hash) continue;
      if (!groups[post.image_hash]) groups[post.image_hash] = [];
      groups[post.image_hash].push(post);
    }

    const matches = Object.values(groups).filter(group => group.length > 1);

    adminPosts.innerHTML = "";

    if (matches.length === 0) {
      adminPosts.innerHTML = `<div class="box full">no same images found</div>`;
      return;
    }

    matches.forEach(group => {
      const box = document.createElement("div");
      box.className = "same-group";

      const title = document.createElement("h2");
      title.textContent = "Same image group (" + group.length + ")";
      box.appendChild(title);

      const grid = document.createElement("div");
      grid.className = "grid";

      group.forEach(post => grid.appendChild(makeAdminCard(post)));

      box.appendChild(grid);
      adminPosts.appendChild(box);
    });
  } catch (err) {
    adminPosts.textContent = err.message;
  }
}

function makeAdminCard(post) {
  const card = document.createElement("div");
  card.className = "admin-card";

  card.innerHTML = `
    <img src="${cleanAttr(post.image_url)}" loading="lazy">

    <input id="title_${post.id}" value="${cleanAttr(post.title || "")}" placeholder="Title">
    <input id="username_${post.id}" value="${cleanAttr(post.username || "")}" placeholder="Username">
    <textarea id="description_${post.id}" placeholder="Description">${clean(post.description || "")}</textarea>

    <label class="nsfw-toggle full">
      <input type="checkbox" id="nsfw_${post.id}" ${post.nsfw ? "checked" : ""}>
      <div class="nsfw-box"></div>
      <span>Mark as NSFW</span>
    </label>

    <input class="full" id="image_${post.id}" type="file" accept="image/png,image/jpeg,image/webp,image/gif">

    <button onclick="savePost('${post.id}', '${cleanJs(post.file_path || "")}')">Save changes</button>
    <button class="danger" onclick="deletePost('${post.id}', '${cleanJs(post.file_path || "")}')">Delete post</button>
  `;

  return card;
}

window.savePost = async function(id, oldFilePath) {
  const title = document.getElementById("title_" + id).value.trim();
  const username = document.getElementById("username_" + id).value.trim() || "anonymous";
  const description = document.getElementById("description_" + id).value.trim();
  const nsfw = document.getElementById("nsfw_" + id).checked;
  const imageInput = document.getElementById("image_" + id);
  const file = imageInput.files[0];

  const updateData = { title, username, description, nsfw };

  try {
    if (file) {
      if (!allowed.includes(file.type)) throw new Error("invalid image type");
      if (file.size > 10 * 1024 * 1024) throw new Error("image over 10mb");

      const safeName = file.name.replace(/[^a-z0-9._-]/gi, "_");
      const newFilePath = crypto.randomUUID() + "_" + safeName;
      const imageHash = await getImageHash(file);

      const upload = await supabase.storage.from("art").upload(newFilePath, file);
      if (upload.error) throw new Error(upload.error.message);

      const imageUrl = supabase.storage.from("art").getPublicUrl(newFilePath).data.publicUrl;

      updateData.image_url = imageUrl;
      updateData.file_path = newFilePath;
      updateData.image_hash = imageHash;

      if (oldFilePath) {
        await supabase.storage.from("art").remove([oldFilePath]);
      }
    }

    const update = await supabase.from("posts").update(updateData).eq("id", id);
    if (update.error) throw new Error(update.error.message);

    if (adminTab === "all") loadAdminPosts();
    if (adminTab === "same") loadSameImages();
  } catch (err) {
    alert(err.message);
  }
};

window.deletePost = async function(id, filePath) {
  if (!confirm("delete this post?")) return;

  const rowDelete = await supabase.from("posts").delete().eq("id", id);

  if (rowDelete.error) {
    alert(rowDelete.error.message);
    return;
  }

  if (filePath) {
    await supabase.storage.from("art").remove([filePath]);
  }

  if (adminTab === "all") loadAdminPosts();
  if (adminTab === "same") loadSameImages();
};

function clean(text) {
  return String(text)
    .replaceAll("&","&amp;")
    .replaceAll("<","&lt;")
    .replaceAll(">","&gt;")
    .replaceAll('"',"&quot;")
    .replaceAll("'","&#039;");
}

function cleanAttr(text) {
  return clean(text);
}

function cleanJs(text) {
  return String(text)
    .replaceAll("\\", "\\\\")
    .replaceAll("'", "\\'");
}

renderPage();
</script>

</body>
</html>
