<!DOCTYPE html>
<html>
<head>
  <title>Yuri Art Gallery</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      background: #0f0f12;
      color: #eee;
      font-family: Arial, sans-serif;
    }

    .wrap {
      max-width: 1100px;
      margin: auto;
      padding: 24px;
    }

    .top {
      margin-bottom: 20px;
      border-bottom: 1px solid #292932;
      padding-bottom: 14px;
    }

    h1 {
      margin: 0;
      font-size: 32px;
    }

    .sub {
      color: #aaa;
      margin-top: 5px;
      font-size: 14px;
    }

    .tabs {
      display: flex;
      gap: 10px;
      margin-top: 14px;
    }

    .tab {
      padding: 9px 15px;
      border-radius: 10px;
      background: #18181d;
      border: 1px solid #292932;
      color: #ddd;
      cursor: pointer;
      font-size: 14px;
    }

    .tab.active {
      background: #ff6fae;
      border-color: #ff6fae;
      color: white;
      font-weight: bold;
    }

    .box {
      background: #18181d;
      border: 1px solid #292932;
      border-radius: 14px;
      padding: 16px;
      margin-bottom: 25px;
    }

    .upload-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    input, textarea, button {
      width: 100%;
      border: 0;
      outline: 0;
      border-radius: 10px;
      padding: 11px;
      font-size: 14px;
    }

    input, textarea {
      background: #101014;
      color: white;
      border: 1px solid #2d2d36;
    }

    textarea {
      resize: vertical;
      min-height: 80px;
      grid-column: span 2;
    }

    #file {
      grid-column: span 2;
    }

    button {
      background: #ff6fae;
      color: white;
      font-weight: bold;
      cursor: pointer;
      grid-column: span 2;
    }

    button:hover {
      filter: brightness(1.08);
    }

    #status {
      color: #bbb;
      margin-bottom: 0;
      font-size: 14px;
    }

    .nsfw-toggle {
      grid-column: span 2;
      display: flex;
      align-items: center;
      gap: 10px;
      cursor: pointer;
      user-select: none;
      font-size: 14px;
      color: #ccc;
      background: #101014;
      border: 1px solid #2d2d36;
      border-radius: 10px;
      padding: 11px;
    }

    .nsfw-toggle input {
      display: none;
    }

    .nsfw-box {
      width: 24px;
      height: 24px;
      border-radius: 7px;
      background: #18181d;
      border: 1px solid #393944;
      position: relative;
      transition: all 0.15s;
      flex: 0 0 auto;
    }

    .nsfw-toggle input:checked + .nsfw-box {
      background: #ff6fae;
      border-color: #ff6fae;
    }

    .nsfw-box::after {
      content: "";
      position: absolute;
      width: 7px;
      height: 12px;
      border: solid white;
      border-width: 0 2px 2px 0;
      top: 3px;
      left: 8px;
      transform: rotate(45deg);
      opacity: 0;
    }

    .nsfw-toggle input:checked + .nsfw-box::after {
      opacity: 1;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(230px, 1fr));
      gap: 16px;
    }

    .card {
      background: #18181d;
      border: 1px solid #292932;
      border-radius: 14px;
      overflow: hidden;
    }

    .card img {
      width: 100%;
      height: 260px;
      object-fit: cover;
      display: block;
      background: #08080a;
    }

    .info {
      padding: 13px;
    }

    .info h3 {
      margin: 0 0 6px;
      font-size: 17px;
    }

    .meta {
      color: #aaa;
      font-size: 12px;
      margin-bottom: 8px;
    }

    .desc {
      color: #ddd;
      font-size: 14px;
      line-height: 1.35;
      white-space: pre-wrap;
    }

    .download {
      display: inline-block;
      margin-top: 10px;
      color: #ff9ccc;
      text-decoration: none;
      font-size: 14px;
    }

    .download:hover {
      text-decoration: underline;
    }

    .modal-bg {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.72);
      display: none;
      align-items: center;
      justify-content: center;
      padding: 20px;
      z-index: 9999;
    }

    .modal {
      width: 100%;
      max-width: 430px;
      background: #18181d;
      border: 1px solid #383846;
      border-radius: 18px;
      padding: 22px;
      box-shadow: 0 20px 80px rgba(0, 0, 0, 0.55);
    }

    .modal h2 {
      margin: 0 0 8px;
      font-size: 24px;
    }

    .modal p {
      margin: 0 0 18px;
      color: #bbb;
      line-height: 1.45;
      font-size: 14px;
    }

    .modal-buttons {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .modal-buttons button {
      grid-column: auto;
    }

    .cancel {
      background: #2a2a34;
    }

    @media (max-width: 600px) {
      .upload-grid { grid-template-columns: 1fr; }
      textarea, #file, button, .nsfw-toggle { grid-column: span 1; }
      .modal-buttons { grid-template-columns: 1fr; }
    }
  </style>
</head>

<body>

<div class="wrap">
  <div class="top">
    <h1>Yuri Art Gallery</h1>
    <div class="sub">post art, browse it, download it</div>

    <div class="tabs">
      <div class="tab active" id="sfwTab" onclick="switchTab('sfw')">SFW</div>
      <div class="tab" id="nsfwTab" onclick="switchTab('nsfw')">NSFW</div>
    </div>
  </div>

  <div class="box">
    <div class="upload-grid">
      <input id="username" placeholder="Username">
      <input id="title" placeholder="Title">
      <textarea id="description" placeholder="Description"></textarea>
      <input id="file" type="file" multiple accept="image/png,image/jpeg,image/webp,image/gif">

      <label class="nsfw-toggle">
        <input type="checkbox" id="nsfwCheck">
        <div class="nsfw-box"></div>
        <span>Mark as NSFW</span>
      </label>

      <button onclick="uploadArt()">Upload</button>
    </div>

    <p id="status"></p>
  </div>

  <div id="gallery" class="grid"></div>
</div>

<div class="modal-bg" id="nsfwModal">
  <div class="modal">
    <h2>NSFW section</h2>
    <p>
      This section may contain adult content. Only continue if you are old enough
      to view it and you understand what you are opening.
    </p>

    <div class="modal-buttons">
      <button class="cancel" onclick="closeNSFWPopup()">Cancel</button>
      <button onclick="confirmNSFW()">Enter</button>
    </div>
  </div>
</div>

<script type="module">
import { createClient } from "https://esm.sh/@supabase/supabase-js@2";

const SUPABASE_URL = "https://elxdfsnccwqqqjiujywi.supabase.co";
const SUPABASE_KEY = "sb_publishable_ENl8RAMVFXPJ1OKxckfsww_NpsjLIH0";

const supabase = createClient(SUPABASE_URL, SUPABASE_KEY);

let currentTab = "sfw";
let nsfwUnlocked = false;

window.switchTab = function(tab) {
  if (tab === "nsfw" && !nsfwUnlocked) {
    document.getElementById("nsfwModal").style.display = "flex";
    return;
  }

  currentTab = tab;

  document.getElementById("sfwTab").classList.remove("active");
  document.getElementById("nsfwTab").classList.remove("active");
  document.getElementById(tab + "Tab").classList.add("active");

  loadGallery();
};

window.closeNSFWPopup = function() {
  document.getElementById("nsfwModal").style.display = "none";
};

window.confirmNSFW = function() {
  nsfwUnlocked = true;
  document.getElementById("nsfwModal").style.display = "none";
  switchTab("nsfw");
};

window.uploadArt = async function () {
  const username = document.getElementById("username").value.trim() || "anonymous";
  const title = document.getElementById("title").value.trim();
  const description = document.getElementById("description").value.trim();
  const files = [...document.getElementById("file").files];
  const nsfw = document.getElementById("nsfwCheck").checked;
  const status = document.getElementById("status");

  if (!title || files.length === 0) {
    status.textContent = "add a title and at least one image";
    return;
  }

  const allowed = ["image/png", "image/jpeg", "image/webp", "image/gif"];

  for (const file of files) {
    if (!allowed.includes(file.type)) {
      status.textContent = file.name + " invalid type";
      return;
    }

    if (file.size > 10 * 1024 * 1024) {
      status.textContent = file.name + " over 10mb";
      return;
    }
  }

  for (let i = 0; i < files.length; i++) {
    const file = files[i];
    status.textContent = "uploading " + (i + 1) + "/" + files.length;

    const safeName = file.name.replace(/[^a-z0-9._-]/gi, "_");
    const filePath = Date.now() + "_" + i + "_" + safeName;

    const upload = await supabase.storage.from("art").upload(filePath, file);

    if (upload.error) {
      status.textContent = upload.error.message;
      return;
    }

    const imageUrl = supabase.storage.from("art").getPublicUrl(filePath).data.publicUrl;

    const post = await supabase.from("posts").insert({
      username,
      title: files.length > 1 ? title + " " + (i + 1) : title,
      description,
      image_url: imageUrl,
      file_path: filePath,
      nsfw
    });

    if (post.error) {
      status.textContent = post.error.message;
      return;
    }
  }

  status.textContent = "uploaded";
  document.getElementById("file").value = "";
  loadGallery();
};

async function loadGallery() {
  const gallery = document.getElementById("gallery");

  const result = await supabase
    .from("posts")
    .select("*")
    .order("created_at", { ascending: false });

  if (result.error) {
    gallery.textContent = result.error.message;
    return;
  }

  gallery.innerHTML = "";

  result.data
    .filter(post => currentTab === "nsfw" ? post.nsfw : !post.nsfw)
    .forEach(post => {
      const time = new Date(post.created_at).toLocaleString();

      const card = document.createElement("div");
      card.className = "card";

      card.innerHTML = `
        <img src="${post.image_url}" loading="lazy">
        <div class="info">
          <h3>${clean(post.title)}</h3>
          <div class="meta">by ${clean(post.username || "anonymous")} · ${clean(time)}</div>
          <div class="desc">${clean(post.description || "")}</div>
          <a class="download" href="${post.image_url}" download>download</a>
        </div>
      `;

      gallery.appendChild(card);
    });
}

function clean(text) {
  return String(text)
    .replaceAll("&","&amp;")
    .replaceAll("<","&lt;")
    .replaceAll(">","&gt;")
    .replaceAll('"',"&quot;")
    .replaceAll("'","&#039;");
}

loadGallery();
</script>

</body>
</html>
