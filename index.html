<!DOCTYPE html>
<html>
<head>
  <title>peak gallery</title>
  <style>
    body {
      margin: 0;
      background: #111;
      color: white;
      font-family: Arial, sans-serif;
      padding: 20px;
    }

    h1 {
      margin-top: 0;
    }

    .box, .card {
      background: #1c1c1c;
      padding: 15px;
      border-radius: 12px;
      margin-bottom: 15px;
    }

    input, textarea, button {
      width: 100%;
      padding: 10px;
      margin-top: 8px;
      border: 0;
      border-radius: 8px;
      box-sizing: border-box;
    }

    button {
      background: #ff6fae;
      color: white;
      font-weight: bold;
      cursor: pointer;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 15px;
    }

    img {
      width: 100%;
      border-radius: 10px;
      background: #000;
    }

    a {
      color: #ff9ccc;
    }
  </style>
</head>
<body>

  <h1>gem alert</h1>

  <div class="box">
    <h2>post</h2>
    <input id="title" placeholder="Title">
    <textarea id="description" placeholder="Description"></textarea>
    <input id="file" type="file" accept="image/png,image/jpeg,image/webp,image/gif">
    <button onclick="uploadArt()">upload</button>
    <p id="status"></p>
  </div>

  <h2>viewing</h2>
  <div id="gallery" class="grid"></div>

  <script type="module">
    import { createClient } from "https://esm.sh/@supabase/supabase-js@2";

    const SUPABASE_URL = "https://elxdfsnccwqqqjiujywi.supabase.co";
    const SUPABASE_KEY = "sb_publishable_ENl8RAMVFXPJ1OKxckfsww_NpsjLIH0";

    const supabase = createClient(SUPABASE_URL, SUPABASE_KEY);

    window.uploadArt = async function () {
      const title = document.getElementById("title").value.trim();
      const description = document.getElementById("description").value.trim();
      const file = document.getElementById("file").files[0];
      const status = document.getElementById("status");

      if (!title || !file) {
        status.textContent = "Add a title and image.";
        return;
      }

      const allowed = ["image/png", "image/jpeg", "image/webp", "image/gif"];
      if (!allowed.includes(file.type)) {
        status.textContent = "Only PNG, JPG, WEBP, or GIF.";
        return;
      }

      if (file.size > 10 * 1024 * 1024) {
        status.textContent = "Max file size is 10MB.";
        return;
      }

      const safeName = file.name.replace(/[^a-z0-9._-]/gi, "_");
      const filePath = Date.now() + "_" + safeName;

      status.textContent = "Uploading...";

      const upload = await supabase.storage
        .from("art")
        .upload(filePath, file);

      if (upload.error) {
        status.textContent = upload.error.message;
        return;
      }

      const publicUrl = supabase.storage
        .from("art")
        .getPublicUrl(filePath)
        .data
        .publicUrl;

      const post = await supabase
        .from("posts")
        .insert({
          title: title,
          description: description,
          image_url: publicUrl,
          file_path: filePath
        });

      if (post.error) {
        status.textContent = post.error.message;
        return;
      }

      status.textContent = "Uploaded.";
      document.getElementById("title").value = "";
      document.getElementById("description").value = "";
      document.getElementById("file").value = "";

      loadGallery();
    };

    async function loadGallery() {
      const gallery = document.getElementById("gallery");

      const result = await supabase
        .from("posts")
        .select("*")
        .order("created_at", { ascending: false });

      if (result.error) {
        gallery.textContent = result.error.message;
        return;
      }

      gallery.innerHTML = "";

      result.data.forEach(post => {
        const card = document.createElement("div");
        card.className = "card";

        card.innerHTML = `
          <img src="${post.image_url}">
          <h3>${clean(post.title)}</h3>
          <p>${clean(post.description || "")}</p>
          <a href="${post.image_url}" download>Download</a>
        `;

        gallery.appendChild(card);
      });
    }

    function clean(text) {
      return String(text)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    loadGallery();
  </script>

</body>
</html>
