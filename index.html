<!DOCTYPE html>
<html>
<head>
  <title>Yuri Art Gallery</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      background: #0f0f12;
      color: #eee;
      font-family: Arial, sans-serif;
    }

    .wrap {
      max-width: 1100px;
      margin: auto;
      padding: 24px;
    }

    .top {
      display: flex;
      justify-content: space-between;
      align-items: end;
      gap: 15px;
      margin-bottom: 25px;
      border-bottom: 1px solid #292932;
      padding-bottom: 18px;
    }

    h1 {
      margin: 0;
      font-size: 32px;
    }

    .sub {
      color: #aaa;
      margin-top: 5px;
      font-size: 14px;
    }

    .box {
      background: #18181d;
      border: 1px solid #292932;
      border-radius: 14px;
      padding: 16px;
      margin-bottom: 25px;
    }

    .upload-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    input, textarea, button {
      width: 100%;
      border: 0;
      outline: 0;
      border-radius: 10px;
      padding: 11px;
      font-size: 14px;
    }

    input, textarea {
      background: #101014;
      color: white;
      border: 1px solid #2d2d36;
    }

    textarea {
      resize: vertical;
      min-height: 80px;
      grid-column: span 2;
    }

    #file {
      grid-column: span 2;
    }

    button {
      background: #ff6fae;
      color: white;
      font-weight: bold;
      cursor: pointer;
      grid-column: span 2;
    }

    button:hover {
      filter: brightness(1.08);
    }

    #status {
      color: #bbb;
      margin-bottom: 0;
      font-size: 14px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(230px, 1fr));
      gap: 16px;
    }

    .card {
      background: #18181d;
      border: 1px solid #292932;
      border-radius: 14px;
      overflow: hidden;
    }

    .card img {
      width: 100%;
      height: 260px;
      object-fit: cover;
      display: block;
      background: #08080a;
    }

    .info {
      padding: 13px;
    }

    .info h3 {
      margin: 0 0 6px;
      font-size: 17px;
    }

    .meta {
      color: #aaa;
      font-size: 12px;
      margin-bottom: 8px;
    }

    .desc {
      color: #ddd;
      font-size: 14px;
      line-height: 1.35;
      white-space: pre-wrap;
    }

    .download {
      display: inline-block;
      margin-top: 10px;
      color: #ff9ccc;
      text-decoration: none;
      font-size: 14px;
    }

    .download:hover {
      text-decoration: underline;
    }

    @media (max-width: 600px) {
      .top {
        display: block;
      }

      .upload-grid {
        grid-template-columns: 1fr;
      }

      textarea, #file, button {
        grid-column: span 1;
      }
    }
  </style>
</head>
<body>

  <div class="wrap">
    <div class="top">
      <div>
        <h1>Yuri Art Gallery</h1>
        <div class="sub">post art, browse it, download it</div>
      </div>
    </div>

    <div class="box">
      <div class="upload-grid">
        <input id="username" placeholder="Username">
        <input id="title" placeholder="Title">
        <textarea id="description" placeholder="Description"></textarea>
        <input id="file" type="file" accept="image/png,image/jpeg,image/webp,image/gif">
        <button onclick="uploadArt()">Upload</button>
      </div>
      <p id="status"></p>
    </div>

    <div id="gallery" class="grid"></div>
  </div>

  <script type="module">
    import { createClient } from "https://esm.sh/@supabase/supabase-js@2";

    const SUPABASE_URL = "https://elxdfsnccwqqqjiujywi.supabase.co";
    const SUPABASE_KEY = "sb_publishable_ENl8RAMVFXPJ1OKxckfsww_NpsjLIH0";

    const supabase = createClient(SUPABASE_URL, SUPABASE_KEY);

    window.uploadArt = async function () {
      const username = document.getElementById("username").value.trim() || "anonymous";
      const title = document.getElementById("title").value.trim();
      const description = document.getElementById("description").value.trim();
      const file = document.getElementById("file").files[0];
      const status = document.getElementById("status");

      if (!title || !file) {
        status.textContent = "add a title and image first";
        return;
      }

      const allowed = ["image/png", "image/jpeg", "image/webp", "image/gif"];
      if (!allowed.includes(file.type)) {
        status.textContent = "only png, jpg, webp, or gif";
        return;
      }

      if (file.size > 10 * 1024 * 1024) {
        status.textContent = "max file size is 10mb";
        return;
      }

      const safeName = file.name.replace(/[^a-z0-9._-]/gi, "_");
      const filePath = Date.now() + "_" + safeName;

      status.textContent = "uploading...";

      const upload = await supabase.storage
        .from("art")
        .upload(filePath, file);

      if (upload.error) {
        status.textContent = upload.error.message;
        return;
      }

      const imageUrl = supabase.storage
        .from("art")
        .getPublicUrl(filePath)
        .data
        .publicUrl;

      const post = await supabase
        .from("posts")
        .insert({
          username,
          title,
          description,
          image_url: imageUrl,
          file_path: filePath
        });

      if (post.error) {
        status.textContent = post.error.message;
        return;
      }

      status.textContent = "uploaded";
      document.getElementById("title").value = "";
      document.getElementById("description").value = "";
      document.getElementById("file").value = "";

      loadGallery();
    };

    async function loadGallery() {
      const gallery = document.getElementById("gallery");

      const result = await supabase
        .from("posts")
        .select("*")
        .order("created_at", { ascending: false });

      if (result.error) {
        gallery.textContent = result.error.message;
        return;
      }

      gallery.innerHTML = "";

      result.data.forEach(post => {
        const card = document.createElement("div");
        card.className = "card";

        const time = new Date(post.created_at).toLocaleString();

        card.innerHTML = `
          <img src="${post.image_url}" loading="lazy">
          <div class="info">
            <h3>${clean(post.title)}</h3>
            <div class="meta">by ${clean(post.username || "anonymous")} · ${clean(time)}</div>
            <div class="desc">${clean(post.description || "")}</div>
            <a class="download" href="${post.image_url}" download>download</a>
          </div>
        `;

        gallery.appendChild(card);
      });
    }

    function clean(text) {
      return String(text)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    loadGallery();
  </script>

</body>
</html>
